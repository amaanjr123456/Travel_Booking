<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Bliss Admin | Unified</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f5f2ee;
            --white: #ffffff;
            --border: #e5e0d8;
            --border2: #d4cec4;
            --text: #1c1a17;
            --muted: #8c8479;
            --accent: #c4763a;
            --accent-bg: #fdf2e9;
            --accepted: #2d7d52;
            --accepted-bg: #e8f5ee;
            --pending: #9a6b1a;
            --pending-bg: #fef7e6;
            --declined: #b03434;
            --declined-bg: #fdeaea;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
            --shadow-lg: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 700;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: var(--accent-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
        }

        /* MAIN & STATS */
        main { max-width: 1000px; margin: 0 auto; padding: 36px 40px; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
        .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; box-shadow: var(--shadow); cursor: pointer; transition: 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .stat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
        .stat-value { font-size: 32px; font-weight: 700; line-height: 1; }

        /* COLORS */
        .stat-card.all .stat-icon { background: #f0f0ff; }
        .stat-card.accepted .stat-icon { background: var(--accepted-bg); }
        .stat-card.pending .stat-icon { background: var(--pending-bg); }
        .stat-card.declined .stat-icon { background: var(--declined-bg); }
        .stat-card.accepted .stat-value { color: var(--accepted); }
        .stat-card.pending .stat-value { color: var(--pending); }
        .stat-card.declined .stat-value { color: var(--declined); }

        /* TOOLBAR */
        .toolbar { display: flex; justify-content: space-between; margin-bottom: 16px; align-items: center; }
        .filters { display: flex; gap: 6px; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
        .filter-btn { border: none; background: none; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-weight: 500; color: var(--muted); }
        .filter-btn.active { background: var(--accent); color: white; }

        /* LIST & CARDS */
        .booking-list { display: flex; flex-direction: column; gap: 10px; }
        .booking-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 18px; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow); }
        .booking-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
        .guest-avatar { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; background: var(--accent-bg); color: var(--accent); }
        
        .badge { padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: capitalize; }
        .badge-accepted { background: var(--accepted-bg); color: var(--accepted); }
        .badge-pending { background: var(--pending-bg); color: var(--pending); }
        .badge-declined { background: var(--declined-bg); color: var(--declined); }

        /* DRAWER */
        .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; backdrop-filter: blur(2px); }
        .drawer-overlay.open { display: block; }
        .drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 400px; background: white; z-index: 101; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 24px; box-shadow: -8px 0 40px rgba(0,0,0,0.1); }
        .drawer.open { transform: translateX(0); }
        .detail-field { background: var(--bg); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .detail-field-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
        .detail-field-value { font-weight: 600; }

        /* TOAST */
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: white; padding: 10px 20px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 1000; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        .status-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 20px; }
        .status-btn { padding: 10px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: 600; }
        .status-btn.accept:hover { background: var(--accepted-bg); color: var(--accepted); }
    </style>
</head>
<body>

    <header>
        <div class="logo"><div class="logo-icon">TB</div> Travel Bliss Admin</div>
        <div class="avatar">AD</div>
    </header>

    <main>
        <div class="stats-row">
            <div class="stat-card all" onclick="fetchBookings()">
                <div class="stat-icon">🗂</div>
                <div class="stat-label">Total</div>
                <div class="stat-value" id="countAll">0</div>
            </div>
            <div class="stat-card accepted">
                <div class="stat-icon">✅</div>
                <div class="stat-label">Accepted</div>
                <div class="stat-value" id="countAccepted">0</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-icon">⏳</div>
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="countPending">0</div>
            </div>
            <div class="stat-card declined">
                <div class="stat-icon">❌</div>
                <div class="stat-label">Declined</div>
                <div class="stat-value" id="countDeclined">0</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="filters">
                <button class="filter-btn active" id="f-all" onclick="filterData('all', this)">All</button>
                <button class="filter-btn" id="f-accepted" onclick="filterData('accepted', this)">Accepted</button>
                <button class="filter-btn" id="f-pending" onclick="filterData('pending', this)">Pending</button>
            </div>
            <input type="text" id="search" placeholder="Search name..." oninput="handleSearch()" style="padding: 8px; border-radius: 8px; border: 1px solid var(--border);">
        </div>

        <div class="booking-list" id="list"></div>
    </main>

    <div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <h2 id="dName">Name</h2>
        <p id="dId" style="color: grey; margin-bottom: 20px;"></p>
        <div id="dGrid"></div>
        <div class="status-btns">
            <button class="status-btn accept" onclick="updateStatus('accepted')">Accept</button>
            <button class="status-btn" onclick="updateStatus('pending')">Pending</button>
            <button class="status-btn" onclick="updateStatus('declined')" style="color: red;">Decline</button>
        </div>
        <button onclick="deleteBooking()" style="margin-top: 20px; width: 100%; padding: 10px; border: none; background: #fff5f5; color: red; border-radius: 8px; cursor: pointer;">Delete Permanently</button>
    </div>

    <div id="toast"></div>

    <script>
        let allData = [];
        let currentId = null;

        async function fetchBookings() {
            try {
                const res = await fetch('/api/bookings');
                allData = await res.json();
                render(allData);
                updateStats();
            } catch (e) { showToast("Fetch Error"); }
        }

        function updateStats() {
            document.getElementById('countAll').innerText = allData.length;
            document.getElementById('countAccepted').innerText = allData.filter(b => b.status === 'accepted').length;
            document.getElementById('countPending').innerText = allData.filter(b => b.status === 'pending').length;
            document.getElementById('countDeclined').innerText = allData.filter(b => b.status === 'declined').length;
        }

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = data.map(b => `
                <div class="booking-card" onclick="openDrawer('${b.id}')">
                    <div class="guest-avatar">${b.name.charAt(0)}</div>
                    <div>
                        <div style="font-weight: 700;">${b.name}</div>
                        <div style="font-size: 12px; color: grey;">${b.id} • ${b.place}</div>
                    </div>
                    <div class="badge badge-${b.status}">${b.status}</div>
                    <div style="color: #ccc;">→</div>
                </div>
            `).join('');
        }

        window.openDrawer = (id) => {
            const b = allData.find(x => x.id === id);
            currentId = id;
            document.getElementById('dName').innerText = b.name;
            document.getElementById('dId').innerText = b.id;
            document.getElementById('dGrid').innerHTML = `
                <div class="detail-field"><div class="detail-field-label">Destination</div><div class="detail-field-value">${b.place}</div></div>
                <div class="detail-field"><div class="detail-field-label">Date</div><div class="detail-field-value">${b.travel}</div></div>
                <div class="detail-field"><div class="detail-field-label">Phone</div><div class="detail-field-value">${b.phone}</div></div>
            `;
            document.getElementById('drawer').classList.add('open');
            document.getElementById('overlay').classList.add('open');
        };

        window.closeDrawer = () => {
            document.getElementById('drawer').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        };

        window.updateStatus = async (s) => {
            await fetch(`/api/bookings/${currentId}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: s})
            });
            showToast("Updated to " + s);
            fetchBookings();
            closeDrawer();
        };

        window.deleteBooking = async () => {
            if(!confirm("Delete?")) return;
            await fetch(`/api/bookings/${currentId}`, {method: 'DELETE'});
            showToast("Deleted");
            fetchBookings();
            closeDrawer();
        };

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        fetchBookings();
    </script>
</body>
</html>
