<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Bliss Pro | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #c4763a;
            --primary-light: #fdf2e9;
            --bg: #faf9f6;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #757575;
            --border: #eeeeee;
            --success: #21a366;
            --warning: #f1a817;
            --danger: #df3c3c;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 4px 20px rgba(0,0,0,0.03);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* SIDE NAV */
        nav {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item.active, .nav-item:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* MAIN CONTENT */
        main {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
        }

        .header-glass {
            position: sticky;
            top: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        .stat-box:hover { transform: translateY(-5px); border-color: var(--primary); }

        .stat-val { font-size: 28px; font-weight: 800; margin: 10px 0 5px; }
        .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }

        /* LISTING */
        .table-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .list-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .booking-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 120px 60px;
            padding: 16px 30px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }

        .booking-row:hover { background: #fafafa; }

        .status-pill {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
        }

        .pill-accepted { background: #e6f7ef; color: var(--success); }
        .pill-pending { background: #fff8e6; color: var(--warning); }
        .pill-declined { background: #fdeaea; color: var(--danger); }

        /* DRAWER SYSTEM */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.1); backdrop-filter: blur(4px); z-index: 100; }
        .drawer {
            position: fixed; right: -450px; top: 0; bottom: 0; width: 450px;
            background: white; z-index: 101; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px; box-shadow: -10px 0 50px rgba(0,0,0,0.05);
        }
        .drawer.open { right: 0; }
        .overlay.open { display: block; }

        .drawer-title { font-size: 24px; font-weight: 800; margin-bottom: 30px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-item { margin-bottom: 15px; }
        .info-label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .info-val { font-weight: 600; font-size: 15px; }

        .action-btns { margin-top: 40px; display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--border);
            font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-outline { background: white; color: var(--text-main); }
        .btn-danger { background: #fff5f5; color: var(--danger); border: none; margin-top: 10px; width: 100%; }

        /* TOAST */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--text-main); color: white; padding: 12px 24px; border-radius: 50px;
            font-weight: 600; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 1000;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo"><span>✈️</span> Travel Bliss</div>
        <a href="#" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">Analytics</a>
        <a href="#" class="nav-item">Messages</a>
        <a href="#" class="nav-item">Settings</a>
    </nav>

    <main>
        <div class="header-glass">
            <div>
                <h1 style="font-size: 20px; font-weight: 800;">Welcome Back, Admin</h1>
                <p style="font-size: 13px; color: var(--text-muted);">Manage your global travel bookings.</p>
            </div>
            <input type="text" id="searchInput" placeholder="Search passenger..." 
                   oninput="handleSearch()"
                   style="padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border); width: 250px; outline: none;">
        </div>

        <div class="stats-grid">
            <div class="stat-box" onclick="fetchData()">
                <div class="stat-label">Total Bookings</div>
                <div class="stat-val" id="count-all">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Confirmed</div>
                <div class="stat-val" id="count-accepted" style="color: var(--success);">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">In Review</div>
                <div class="stat-val" id="count-pending" style="color: var(--warning);">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Cancelled</div>
                <div class="stat-val" id="count-declined" style="color: var(--danger);">0</div>
            </div>
        </div>

        <div class="table-container">
            <div class="list-header">
                <span style="font-weight: 800;">Recent Requests</span>
                <button onclick="fetchData()" style="border:none; background:none; cursor:pointer; color:var(--primary); font-weight:700;">Refresh List</button>
            </div>
            <div id="booking-list">
                </div>
        </div>
    </main>

    <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-title" id="d-name">Passenger Name</div>
        <div class="info-grid" id="d-grid">
            </div>
        <div class="action-btns">
            <button class="btn btn-primary" onclick="updateStatus('accepted')">Approve</button>
            <button class="btn btn-outline" onclick="updateStatus('pending')">Pending</button>
        </div>
        <button class="btn btn-outline" style="margin-top:10px;" onclick="updateStatus('declined')">Reject Booking</button>
        <button class="btn btn-danger" onclick="deleteBooking()">Delete Record Permanently</button>
    </div>

    <div id="toast"></div>

    <script>
        let bookings = [];
        let currentId = null;

        async function fetchData() {
            try {
                const res = await fetch('/api/bookings');
                bookings = await res.json();
                render(bookings);
                updateCounters();
            } catch (e) { showToast("Failed to load data."); }
        }

        function updateCounters() {
            document.getElementById('count-all').innerText = bookings.length;
            document.getElementById('count-accepted').innerText = bookings.filter(b => b.status === 'accepted').length;
            document.getElementById('count-pending').innerText = bookings.filter(b => b.status === 'pending').length;
            document.getElementById('count-declined').innerText = bookings.filter(b => b.status === 'declined').length;
        }

        function render(data) {
            const list = document.getElementById('booking-list');
            list.innerHTML = data.map(b => `
                <div class="booking-row" onclick="openDrawer('${b.id}')">
                    <div style="font-weight: 700;">${b.name}</div>
                    <div style="color: var(--text-muted); font-size: 13px;">${b.place}</div>
                    <div style="font-size: 13px;">${b.travel}</div>
                    <div class="status-pill pill-${b.status}">${b.status}</div>
                    <div style="color: var(--border); text-align: right;">→</div>
                </div>
            `).join('');
        }

        window.handleSearch = () => {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = bookings.filter(b => b.name.toLowerCase().includes(q) || b.id.toLowerCase().includes(q));
            render(filtered);
        };

        window.openDrawer = (id) => {
            const b = bookings.find(x => x.id === id);
            currentId = id;
            document.getElementById('d-name').innerText = b.name;
            document.getElementById('d-grid').innerHTML = `
                <div class="info-item"><div class="info-label">Booking ID</div><div class="info-val">${b.id}</div></div>
                <div class="info-item"><div class="info-label">Phone</div><div class="info-val">${b.phone}</div></div>
                <div class="info-item"><div class="info-label">Destination</div><div class="info-val">${b.place}</div></div>
                <div class="info-item"><div class="info-label">Status</div><div class="info-val" style="text-transform:capitalize;">${b.status}</div></div>
            `;
            document.getElementById('drawer').classList.add('open');
            document.getElementById('overlay').classList.add('open');
        };

        window.closeDrawer = () => {
            document.getElementById('drawer').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        };

        window.updateStatus = async (s) => {
            await fetch(`/api/bookings/${currentId}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: s})
            });
            showToast("Booking " + s);
            fetchData();
            closeDrawer();
        };

        window.deleteBooking = async () => {
            if(!confirm("Are you sure? This is permanent.")) return;
            await fetch(`/api/bookings/${currentId}`, {method: 'DELETE'});
            showToast("Deleted record");
            fetchData();
            closeDrawer();
        };

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        fetchData();
    </script>
</body>
</html>
